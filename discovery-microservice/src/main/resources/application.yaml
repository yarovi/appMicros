server:
  port: 8761
  servlet:
    context-path: /eureka
spring:
  application:
    name: discovery-microservice
eureka:
  instance:
    hostname: localhost
  client:
    register-with-eureka: false
    fetch-registry: false
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/eureka

